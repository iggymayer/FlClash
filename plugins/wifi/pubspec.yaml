name: wifi
description: WiFi SSID monitoring plugin for FlClash, supporting Android, Windows, macOS, and Linux.
version: 0.0.1
homepage:
publish_to: none

environment:
  sdk: '>=3.4.4 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.follow.clash.plugins
        pluginClass: WifiPlugin
      windows:
        pluginClass: WifiPluginCApi
      linux:
        pluginClass: WifiPlugin
